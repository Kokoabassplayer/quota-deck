<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#091210">
    <meta name="description" content="ดูโควตา CodexBar บนมือถือผ่านเครือข่ายส่วนตัว">
    <meta name="color-scheme" content="dark">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icons/quota-deck.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="stylesheet" href="/styles.css">
    <title>Quota Deck</title>
  </head>
  <body>
    <a class="skip-link" href="#main-content" data-i18n="ข้ามไปดูโควตา">ข้ามไปดูโควตา</a>
    <div class="deck-shell">
      <header class="masthead">
        <div class="brand-lockup" aria-label="Quota Deck">
          <span class="brand-mark" aria-hidden="true">
            <i></i><i></i><i></i>
          </span>
          <span>
            <strong>QUOTA DECK</strong>
            <small>PRIVATE AI RUNWAY</small>
          </span>
        </div>
        <div class="masthead-actions">
          <button class="install-button" id="install-button" type="button" aria-label="ติดตั้ง Quota Deck" data-i18n="ติดตั้ง" data-i18n-aria="ติดตั้ง Quota Deck" hidden>ติดตั้ง</button>
          <button class="language-button" id="language-button" type="button" aria-label="Switch language">EN</button>
          <button class="sync-chip" id="refresh-button" type="button" data-tone="loading" aria-busy="true" disabled>
            <span class="signal-dot" aria-hidden="true"></span>
            <span class="sync-copy">
              <span id="sync-label" data-i18n="กำลังเชื่อมต่อ">กำลังเชื่อมต่อ</span>
              <span class="sync-action" id="refresh-label" data-i18n="รอสักครู่">รอสักครู่</span>
            </span>
          </button>
        </div>
      </header>

      <nav class="provider-switcher" id="provider-switcher" aria-label="มุมมองโควตา" data-i18n-aria="มุมมองโควตา" hidden>
        <div class="provider-tabs" id="provider-tabs" role="tablist" aria-label="เลือกผู้ให้บริการ" data-i18n-aria="เลือกผู้ให้บริการ"></div>
      </nav>

      <main id="main-content">
        <section class="provider-board" id="provider-board" aria-labelledby="providers-title" data-view="overview">
          <header class="section-heading">
            <div>
              <p class="eyebrow" data-i18n="ทางเลือกที่ใช้ได้ตอนนี้">ทางเลือกที่ใช้ได้ตอนนี้</p>
              <h1 id="providers-title" data-i18n="รอบโควตา">รอบโควตา</h1>
            </div>
            <p id="provider-count">- ผู้ให้บริการ</p>
          </header>
          <div id="provider-list" aria-busy="true">
            <article class="loading-strip" aria-label="กำลังโหลดข้อมูลผู้ให้บริการ" data-i18n-aria="กำลังโหลดข้อมูลผู้ให้บริการ">
              <span></span><span></span><span></span>
            </article>
          </div>
        </section>

        <section class="reset-board" id="reset-board" aria-labelledby="reset-title" hidden>
          <header class="section-heading">
            <div>
              <p class="eyebrow" data-i18n="เรียงตามเวลาจริง">เรียงตามเวลาจริง</p>
              <h2 id="reset-title" data-i18n="ขบวนรีเซ็ตถัดไป">ขบวนรีเซ็ตถัดไป</h2>
            </div>
          </header>
          <ol class="reset-list" id="reset-list"></ol>
        </section>
      </main>

      <footer class="deck-footer">
        <p><span>COMPUTER SOURCE</span> <strong id="source-version" data-i18n="รอการเชื่อมต่อ">รอการเชื่อมต่อ</strong></p>
        <p data-i18n="ข้อมูลส่วนตัวไม่ถูกเก็บบนมือถือ">ข้อมูลส่วนตัวไม่ถูกเก็บบนมือถือ</p>
      </footer>
      <p class="sr-only" id="sync-announcer" aria-live="polite"></p>
    </div>
    <script type="module" src="/app.mjs"></script>
  </body>
</html>
